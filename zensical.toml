[project]
site_name = "zigporter"
site_description = "Home Assistant device management — migrate from ZHA to Z2M, rename entities and devices with full cascade"
site_author = "Even Nordstad"
site_url = "https://nordstad.github.io/zigporter"
repo_url = "https://github.com/nordstad/zigporter"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Configuration" = "getting-started/configuration.md" },
  ] },
  { "Guide" = [
    { "Migration wizard" = "guide/migration-wizard.md" },
    { "Rename commands" = "guide/rename.md" },
    { "Z2M authentication" = "guide/authentication.md" },
  ] },
  { "Architecture" = "architecture.md" },
  { "Development" = "development.md" },
]

[project.theme]
name = "material"
variant = "modern"
features = [
  "content.code.copy",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
